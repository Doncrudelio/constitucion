<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Crudelio Cevichería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&amp;display=swap');
        
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
        }
        
        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(255, 200, 0, 0.2));
            z-index: 2;
        }
        
        .logo {
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
        
        /* Botón MENU 3D */
        .btn-menu {
            background: rgba(255, 215, 0, 0.85);
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 18px 48px;
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 
                0 8px 0 #d97706,
                0 12px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.1s ease;
            border: 4px solid #fff;
            text-shadow: 3px 3px 0 #d97706;
        }
        
        .btn-menu:active {
            transform: translateY(6px);
            box-shadow: 
                0 2px 0 #d97706,
                0 6px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-experiencia {
            background: rgba(255, 255, 255, 0.9);
            color: #1e40af;
            font-size: 1.6rem;
            font-weight: 700;
            padding: 16px 40px;
            border-radius: 15px;
            text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-experiencia:hover {
            transform: scale(1.08);
            background: white;
        }
        
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 420px;
            margin: 0 auto;
        }
        
        .menu-img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        
        .menu-img:hover {
            transform: scale(1.03);
        }
        
        .nav-home {
            transition: transform 0.3s ease;
        }
        
        .nav-home:hover {
            transform: scale(1.15);
        }
        
        .section-menu {
            background: linear-gradient(180deg, #facc15 0%, #eab308 100%);
        }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden">
    
    <!-- HERO - INICIO con video de fondo -->
    <section id="home" class="relative min-h-screen flex items-center justify-center overflow-hidden">
        
        <!-- Video de fondo -->
        <video autoplay muted loop playsinline class="hero-video">
            <source src="video1.mp4" type="video/mp4">
            
        </video>
        
        <!-- Overlay suave con tono amarillo -->
        <div class="overlay"></div>
        
        <!-- Barra superior -->
        <nav class="absolute top-6 left-6 z-50">
            <a href="https://www.facebook.com/share/1C5sGQxTPJ/?mibextid=wwXIfr" 
               target="_blank" 
               class="block">
                <img src="face.png" 
                     alt="Facebook Don Crudelio" 
                     class="w-14 h-14 rounded-full border-4 border-white shadow-xl hover:scale-110 transition-transform">
            </a>
        </nav>
        
        <!-- Logo centrado (discreto para no tapar el video) -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 text-center w-full px-6">
            <img src="logo.png" 
                 alt="Don Crudelio Cevichería" 
                 class="logo mx-auto w-80 md:w-96 drop-shadow-2xl">
            
            <!-- Botones debajo del logo -->
            <div class="mt-12 flex flex-col md:flex-row gap-6 justify-center items-center">
                
                <!-- Botón MENU 3D -->
                <a href="#menu" 
                   class="btn-menu inline-block text-center">
                    MENÚ
                </a>
                
                <!-- Botón CUÉNTANOS TU EXPERIENCIA -->
                <a href="https://maps.app.goo.gl/StQWud7YD2YMGYN49" 
                   target="_blank"
                   class="btn-experiencia inline-block text-center">
                    CUÉNTANOS TU EXPERIENCIA
                </a>
            </div>
        </div>
        
        <!-- Texto decorativo inferior (como en el logo) -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 text-yellow-400 text-2xl tracking-widest font-black opacity-80 z-30">
            
        </div>
    </section>
    
    <!-- SECCIÓN MENÚ -->
    <section id="menu" class="section-menu py-16 min-h-screen relative">
        
        <!-- Botón Home arriba izquierda -->
        <div class="absolute top-15 left-6 z-50">
            <a href="#home" class="nav-home block">
                <img src="home.png" 
                     alt="Volver al inicio" 
                     class="w-14 h-14 rounded-2xl border-4 border-white shadow-2xl">
            </a>
        </div>
           
                </div>
            </div>
            
            <!-- Galería de imágenes vertical (perfecto para celular) -->
            <div class="">
                <img src="imagen2.png" alt="Plato 2" class="menu-img">
                <img src="imagen3.png" alt="Plato 3" class="menu-img">
                <img src="imagen4.png" alt="Plato 4" class="menu-img">
                <img src="imagen5.png" alt="Plato 5" class="menu-img">
                <img src="imagen6.png" alt="Plato 6" class="menu-img">
                <img src="imagen7.png" alt="Plato 7" class="menu-img">
                <img src="imagen8.png" alt="Plato 8" class="menu-img">
            </div>
            
            <!-- Pie de menú -->
            <div class="text-center mt-16 text-white text-xl font-black tracking-widest">
                DON CRUDELIO CEVICHERÍA<br>
                <span class="text-yellow-900 text-lg">¡Siempre fresco, siempre crudo!</span>
            </div>
        </div>
    </section>
    
    <!-- Footer simple -->
    <footer class="bg-black py-8 text-center text-yellow-300 text-sm">
        © 2026 Don Crudelio Cevichería • Todos los derechos reservados
    </footer>
    
    <script>
        // Tailwind script (ya cargado)
        function initTailwind() {
            // No necesita configuración extra
        }
        
        // Scroll suave (por si acaso)
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                if (this.getAttribute('href') === '#menu' || this.getAttribute('href') === '#home') {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });
        
        // Autoplay video seguro en móviles
        window.addEventListener('load', () => {
            const video = document.querySelector('video');
            if (video) {
                video.play().catch(() => {});
            }
        });
    </script>
</body>
</html>
